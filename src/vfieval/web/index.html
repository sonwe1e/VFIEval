<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VFIEval 推理工具</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <h1>VFIEval</h1>
          <p>本地视频插帧评测 <a class="brand-author" href="https://github.com/sonwe1e" target="_blank" rel="noreferrer">@sonwe1e</a></p>
        </div>
        <nav class="nav" aria-label="主导航">
          <button class="nav-item active" data-view="create" type="button">新建任务</button>
          <button class="nav-item" data-view="compare" type="button">视频对比</button>
          <button class="nav-item" data-view="runs" type="button">运行记录</button>
          <button class="nav-item" data-view="stats" type="button">评分统计</button>
        </nav>
      </aside>

    <main class="shell">
      <section id="view-create" class="view active">
        <div class="view-head">
          <h2>新建任务</h2>
          <p class="muted">配置模型推理，可多选视频集合并为一个任务，确认选择后开始运行。</p>
        </div>
        <form id="infer-form" class="panel infer-grid">
          <input type="hidden" name="run_type" value="model_inference">

          <div class="mode-section" data-mode-section="model_inference">
            <fieldset class="field-group">
              <legend>模型</legend>
              <div class="field-grid">
                <label>
                  <span>模型文件</span>
                  <select name="model_file"></select>
                </label>
                <label>
                  <span>权重</span>
                  <select name="checkpoint"></select>
                </label>
              </div>
            </fieldset>

            <fieldset class="field-group">
              <legend>输入</legend>
              <div class="field-grid">
                <label class="wide-field">
                  <span>视频集（可多选合并为一个任务）</span>
                  <div id="video-group-picker" class="group-picker"></div>
                  <select name="video_group" hidden></select>
                </label>
              </div>
            </fieldset>

            <fieldset class="field-group">
              <legend>输出分辨率</legend>
              <div class="field-grid">
                <label>
                  <span>分辨率模式</span>
                  <select name="resolution_mode">
                    <option value="original">原始</option>
                    <option value="720p">720p</option>
                    <option value="custom">自定义</option>
                  </select>
                </label>
                <label class="custom-size">
                  <span>高度</span>
                  <input name="height" type="number" min="1" placeholder="H" value="832">
                </label>
                <label class="custom-size">
                  <span>宽度</span>
                  <input name="width" type="number" min="1" placeholder="W" value="1792">
                </label>
              </div>
            </fieldset>

            <fieldset class="field-group">
              <legend>执行</legend>
              <div class="field-grid">
                <label>
                  <span>设备</span>
                  <select name="device">
                    <option value="auto">auto</option>
                    <option value="cuda">cuda</option>
                    <option value="npu">npu</option>
                    <option value="cpu">cpu</option>
                  </select>
                </label>
                <label>
                  <span>执行模式</span>
                  <select name="execution_mode">
                    <option value="single">单设备</option>
                    <option value="multi_cuda">多卡 CUDA</option>
                    <option value="multi_npu" selected>多卡 NPU</option>
                  </select>
                </label>
              </div>
            </fieldset>
          </div>

          <details class="advanced">
            <summary>高级设置</summary>
            <div class="advanced-grid" data-mode-section="model_inference">
              <label>
                <span>精度</span>
                <select name="precision">
                  <option value="auto">auto</option>
                  <option value="fp32" selected>fp32</option>
                  <option value="fp16">fp16</option>
                  <option value="bf16">bf16</option>
                </select>
              </label>
              <label>
                <span>可视化高度</span>
                <input name="visualize_height" type="number" min="1" value="384">
              </label>
              <label>
                <span>可视化宽度</span>
                <input name="visualize_width" type="number" min="1" value="832">
              </label>
              <label>
                <span>Batch Size</span>
                <input name="batch_size" type="number" min="1" value="64">
              </label>
              <label>
                <span>每卡 Batch Size</span>
                <input name="batch_size_per_device" type="number" min="1" value="64">
              </label>
              <label>
                <span>frame_step</span>
                <input name="frame_step" type="number" min="1" value="1">
              </label>
              <label>
                <span>max_frames</span>
                <input name="max_frames" type="number" min="1" placeholder="不限">
              </label>
            </div>
            <div id="device-options" class="device-options" data-mode-section="model_inference"></div>
            <div class="metric-options">
              <span>可选指标</span>
              <div id="metrics-options" class="checkbox-row"></div>
            </div>
          </details>

          <button id="refresh-files" class="secondary" type="button">刷新文件列表</button>
          <button id="start-run" type="submit" disabled>开始任务</button>
        </form>

        <section id="video-selection" class="panel video-selection"></section>
        <section id="metric-environment" class="panel"></section>
        <section id="preflight" class="panel preflight"></section>
      </section>

      <section id="view-compare" class="view">
        <div class="view-head">
          <h2>视频对比</h2>
          <p class="muted">从服务器已有资源里挑选 GT 与预测结果，任意两两或三三对比。GT 可留空做纯预测对比。</p>
        </div>
        <form id="compare-form" class="panel infer-grid">
          <fieldset class="field-group">
            <legend>对齐方式</legend>
            <div class="field-grid">
              <label>
                <span>对齐方式</span>
                <select name="align_mode">
                  <option value="strict">strict</option>
                </select>
              </label>
            </div>
          </fieldset>
          <details class="advanced">
            <summary>可选指标</summary>
            <div class="metric-options">
              <div id="compare-metrics-options" class="checkbox-row"></div>
            </div>
          </details>
          <button id="refresh-compare-sources" class="secondary" type="button">刷新对比来源</button>
          <button id="start-compare" type="submit" disabled>开始对比</button>
        </form>

        <section id="compare-selection" class="panel video-selection"></section>
        <section id="compare-preflight" class="panel preflight"></section>
      </section>

      <section id="view-runs" class="view">
        <section class="panel">
          <div class="panel-head">
            <h2>运行记录</h2>
            <button id="refresh" class="secondary" type="button">刷新</button>
          </div>
          <div id="runs-table" class="table"></div>
        </section>
        <section id="run-detail" class="panel"></section>
      </section>

      <section id="view-stats" class="view">
        <section class="panel">
          <div class="panel-head">
            <div>
              <h2>评分统计</h2>
              <p class="muted">汇总各运行记录的用户评分与提出的问题。</p>
            </div>
            <button id="refresh-stats" class="secondary" type="button">刷新</button>
          </div>
          <div id="stats-content"></div>
        </section>
      </section>
    </main>
    </div>

    <div id="toast" role="status"></div>
    <script src="/app.js"></script>
  </body>
</html>
