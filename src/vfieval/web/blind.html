<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VFIEval Blind Vote</title>
    <link rel="stylesheet" href="/blind.css">
  </head>
  <body>
    <main class="blind-shell">
      <header class="blind-header">
        <div>
          <p class="eyebrow">VFIEval</p>
          <h1 id="campaign-title">匿名视频质量评测</h1>
        </div>
        <div id="progress" class="progress-pill" aria-live="polite">准备中</div>
      </header>

      <section id="session-panel" class="panel">
        <h2>开始评测</h2>
        <p class="muted">显示名只用于统计参与进度；候选身份会在您完成全部任务后显示。</p>
        <form id="session-form" class="session-form">
          <label>
            <span>评测员显示名</span>
            <input name="display_name" maxlength="120" autocomplete="name" required>
          </label>
          <button type="submit">进入盲评</button>
        </form>
      </section>

      <section id="task-panel" class="panel hidden" aria-live="polite">
        <div class="task-head">
          <div>
            <p class="eyebrow">匿名任务</p>
            <h2 id="task-video">视频</h2>
          </div>
          <p class="muted">参考 GT 仅用于观察；请选择质量更好的候选，或选择平局。</p>
        </div>

        <div id="review-toolbar" class="review-toolbar hidden">
          <button id="review-back" class="secondary" type="button">返回已评列表</button>
          <span id="review-mode-label" class="muted"></span>
        </div>

        <div class="media-control-dock">
        <div class="blind-media-toolbar">
          <div class="media-toolbar-groups">
            <div class="view-switch" role="group" aria-label="媒体显示方式">
              <span class="view-switch-label">显示方式</span>
              <button id="view-wipe" class="view-option" type="button" aria-pressed="true" aria-controls="media-grid">分割线</button>
              <button id="view-full" class="view-option" type="button" aria-pressed="false" aria-controls="media-grid">完整</button>
            </div>
            <div id="playback-scope" class="scope-switch" role="group" aria-label="参与同步播放的媒体">
              <span class="view-switch-label">播放范围</span>
              <button class="scope-option" data-playback-scope="all" type="button" aria-pressed="true" aria-controls="media-grid" aria-label="两个视图同步">两个视图同步</button>
              <button class="scope-option" data-playback-scope="reference" type="button" aria-pressed="false" aria-controls="media-grid">仅 GT</button>
              <button class="scope-option scope-wipe-only" data-playback-scope="candidates" type="button" aria-pressed="false" aria-controls="media-grid">仅候选对比</button>
              <button class="scope-option scope-full-only hidden" data-playback-scope="left" type="button" aria-pressed="false" aria-controls="media-grid">仅 A</button>
              <button class="scope-option scope-full-only hidden" data-playback-scope="right" type="button" aria-pressed="false" aria-controls="media-grid">仅 B</button>
            </div>
          </div>
          <p id="sync-status" class="sync-status" role="status" aria-live="polite">等待媒体就绪</p>
        </div>

        <div id="playback-controls" class="playback-controls">
          <button id="master-play" type="button">播放所选</button>
          <div class="frame-stepper video-frame-stepper">
            <button id="master-prev" class="secondary frame-step" type="button" aria-label="上一帧">上一帧</button>
            <label class="seek-label"><span id="master-frame-label">帧 1/1</span><input id="master-seek" type="range" min="0" max="0" step="1" value="0" aria-label="视频帧位置"></label>
            <button id="master-next" class="secondary frame-step" type="button" aria-label="下一帧">下一帧</button>
          </div>
          <label><span>倍速</span><select id="master-rate"><option value="0.5">0.5×</option><option value="1" selected>1×</option><option value="2">2×</option><option value="4">4×</option></select></label>
          <label class="check"><input id="master-loop" type="checkbox" checked>循环</label>
        </div>

        <div id="frame-control" class="frame-control hidden">
          <div class="frame-stepper frame-sequence-stepper">
            <button id="frame-prev" class="secondary frame-step" type="button" aria-label="上一帧">上一帧</button>
            <label><span id="frame-label">帧 1/1</span><input id="frame-range" type="range" min="0" max="0" step="1" value="0" aria-label="帧序列位置"></label>
            <button id="frame-next" class="secondary frame-step" type="button" aria-label="下一帧">下一帧</button>
          </div>
        </div>
        <button id="media-reload" class="secondary media-reload hidden" type="button">重新加载</button>
        </div>

        <div id="media-grid" class="media-grid view-wipe"></div>
        <div class="wipe-control-shell">
          <label class="wipe-control-label" for="wipe-divider">候选 A / B 分界位置</label>
          <input
            id="wipe-divider"
            type="range"
            min="0"
            max="100"
            step="1"
            value="50"
            aria-label="候选 A 与候选 B 的分界位置"
            aria-valuetext="候选 A 50%，候选 B 50%"
            aria-describedby="wipe-instructions"
          >
          <p id="wipe-instructions" class="wipe-instructions muted">拖动分界线查看同一位置的差异；键盘可使用左右方向键、Home 和 End。触屏上下滑动仍可滚动页面。</p>
        </div>
        <form id="vote-form">
          <fieldset class="outcome-fieldset">
            <legend>请选择谁更好（必选）</legend>
            <div class="outcome-options">
              <label><input name="choice" value="left" type="radio" required><span>候选 A 更好</span></label>
              <label><input name="choice" value="tie" type="radio" required><span>平局</span></label>
              <label><input name="choice" value="right" type="radio" required><span>候选 B 更好</span></label>
            </div>
          </fieldset>
          <div class="rating-grid">
            <label for="left-rating"><span>候选 A 评分（可选）</span><input id="left-rating" name="left_rating" type="number" min="1" max="5" step="0.25" inputmode="decimal" placeholder="1–5"></label>
            <label for="right-rating"><span>候选 B 评分（可选）</span><input id="right-rating" name="right_rating" type="number" min="1" max="5" step="0.25" inputmode="decimal" placeholder="1–5"></label>
          </div>
          <div class="vote-meta">
            <label><span>置信度</span><select name="confidence"><option value="">未填写</option><option value="low">低</option><option value="medium">中</option><option value="high">高</option></select></label>
            <label class="note"><span>备注</span><textarea name="note" maxlength="4000" rows="2"></textarea></label>
          </div>
          <div class="vote-save-actions"><button id="save-vote" type="submit">保存并继续</button></div>
        </form>
      </section>

      <section id="complete-panel" class="panel hidden">
        <h2>个人任务已完成</h2>
        <p class="muted">以下为当前实时结果；新投票进入后统计可能继续变化。</p>
        <div id="review-list" class="review-list"></div>
        <div id="live-results"></div>
      </section>

      <section id="request-diagnostic" class="panel request-diagnostic hidden" role="alert" aria-live="assertive"></section>
      <section id="message-panel" class="panel hidden" role="alert"></section>
    </main>
    <div id="toast" role="status"></div>
    <script>
      window.__vfievalBlindReady = false;
      window.__vfievalBlindBootError = function (message) {
        if (window.__vfievalBlindReady) return;
        var panel = document.getElementById("message-panel");
        if (!panel) return;
        panel.textContent = "盲评页面脚本启动失败：" + (message || "请检查 /blind.js 是否能通过当前映射地址访问");
        panel.classList.remove("hidden");
      };
      window.addEventListener("error", function (event) {
        window.__vfievalBlindBootError(event.message);
      });
      window.setTimeout(function () {
        if (window.__vfievalBlindReady) return;
        var panel = document.getElementById("message-panel");
        if (!panel) return;
        panel.textContent = "盲评页面脚本未能加载，请刷新页面；若仍失败，请检查端口映射是否同时转发了 /blind.js 和 /api/blind/ 请求。";
        panel.classList.remove("hidden");
      }, 3000);
    </script>
    <script src="/shared.js" onerror="window.__vfievalBlindBootError('无法加载 /shared.js')"></script>
    <script src="/blind.js" onerror="window.__vfievalBlindBootError('无法加载 /blind.js')"></script>
  </body>
</html>
