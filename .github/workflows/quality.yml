name: quality

on:
  push:
  pull_request:

jobs:
  cpu-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install system media tools
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install VFIEval and quality tools
        run: python -m pip install --upgrade pip && python -m pip install -e ".[test,dev]"
      - name: Python static checks
        run: ruff check src tests
      - name: Full CPU test suite
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests
      - name: JavaScript syntax
        run: |
          for file in src/vfieval/web/*.js; do
            node --check "$file"
          done
      - name: Committed whitespace check
        run: git diff --check HEAD^ HEAD
